{% extends 'base.html' %}

{% block content %}
<div class="page-title">Edit Transaction</div>
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form action="/edit/{{ transaction.id }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" value="{{ transaction.date }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" value="{{ transaction.description }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" class="form-control" step="0.01" min="0" value="{{ transaction.amount }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Type</label>
                <select name="type" class="form-select">
                    <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
                    <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category_id" class="form-select">
                    <option value="">None</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if transaction.category_id == c.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
